# Render Blueprint for candid-api.
# EU region (Frankfurt) is required per CLAUDE.md — do not change.

envVarGroups:
  - name: candid-api-env
    envVars:
      - key: ENV
        value: prod
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: SUPABASE_REGION
        value: eu-central-1
      - key: R2_REGION
        value: auto
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_B64
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: DEV_ENDPOINTS_ENABLED
        value: "false"

services:
  - type: web
    name: candid-api
    runtime: docker
    region: frankfurt
    plan: starter
    healthCheckPath: /health
    envVars:
      - fromGroup: candid-api-env

  # Single Background Worker — APScheduler runs generator (60m + startup),
  # dispatcher (60s), and expirer (60s) jobs in-process. See workers/main.py
  # for the rationale (one process is cheaper than three crons and keeps the
  # jobs hot in memory).
  - type: worker
    name: candid-workers
    runtime: docker
    region: frankfurt
    plan: starter
    dockerCommand: uv run python -m app.workers.main
    envVars:
      - fromGroup: candid-api-env
